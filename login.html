{% extends "base.html" %}

{% block title %}Login - Campus Complaint System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="text-center mb-4"><i class="fas fa-sign-in-alt text-primary"></i> Login</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('register') }}" class="text-decoration-none">Don't have account? Register</a>
                </div>
                <hr>
                <div class="text-center">
                    <small>Demo: <strong>admin</strong> / <strong>admin123</strong></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
